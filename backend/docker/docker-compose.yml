version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: 2know-postgres
    environment:
      POSTGRES_USER: 2know
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: 2know_dev
    ports:
      - "5434:5432"
    volumes:
      - 2know_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: 2know-redis
    ports:
      - "6380:6379"
    volumes:
      - 2know_redis_data:/data
    restart: unless-stopped

volumes:
  2know_postgres_data:
  2know_redis_data:
