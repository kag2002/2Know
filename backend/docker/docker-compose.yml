version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quizlm-postgres
    environment:
      POSTGRES_USER: quizlm
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: quizlm_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quizlm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
